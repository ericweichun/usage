<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #0b2841;
      --paper: rgba(16, 49, 78, 0.62);
      --paper-soft: rgba(14, 44, 71, 0.92);
      --paper-edge: rgba(150, 201, 236, 0.42);
      --line: rgba(150, 201, 236, 0.3);
      --text: #e7f1fb;
      --muted: #95bcd8;
      --gold: rgba(150, 201, 236, 0.4);
      --claude: #74bdff;
      --codex: #5fcfdc;
      --projects: #aed4ef;
      --warn: #e6ad3e;
      --danger: #f06a47;
      --mono: "SFMono-Regular", "JetBrains Mono", "Menlo", "Consolas", monospace;
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body {
      width: 100%;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", "Noto Serif TC", "Songti TC", "Songti SC", "STSong", serif;
      font-size: 15px;
      line-height: 1.3;
      letter-spacing: 0.01em;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      padding: 10px;
      position: relative;
      background:
        radial-gradient(circle at 18% 10%, rgba(64, 132, 190, 0.22), transparent 32%),
        radial-gradient(circle at 84% 88%, rgba(34, 86, 132, 0.26), transparent 36%),
        linear-gradient(180deg, #123f63 0%, #0b2841 46%, #081f33 100%);
      background-color: #0b2841;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      opacity: 0.6;
      background:
        repeating-linear-gradient(0deg, rgba(159, 205, 240, 0.16) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(90deg, rgba(159, 205, 240, 0.16) 0 1px, transparent 1px 72px),
        repeating-linear-gradient(0deg, rgba(159, 205, 240, 0.07) 0 1px, transparent 1px 14.4px),
        repeating-linear-gradient(90deg, rgba(159, 205, 240, 0.07) 0 1px, transparent 1px 14.4px);
    }

    body::after {
      opacity: 0.5;
      background:
        radial-gradient(circle at 50% 0%, rgba(120, 180, 230, 0.12), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(6, 22, 38, 0.55), transparent 55%);
    }

    .specimen-drift,
    .specimen-drift * {
      pointer-events: none;
    }

    .specimen-drift {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 5;
    }

    .dust {
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180, 220, 250, 0.16) 0%, rgba(180, 220, 250, 0.05) 42%, transparent 72%);
      filter: blur(2px);
      opacity: 0.4;
      animation: dustFloat 18s ease-in-out infinite;
      transform: translate3d(0, 0, 0);
    }

    .dust-a { top: 18px; right: 24px; animation-delay: -4s; }
    .dust-b { bottom: 56px; left: 8px; width: 110px; height: 110px; animation-duration: 22s; }
    .dust-c { top: 142px; left: 118px; width: 90px; height: 90px; animation-duration: 20s; animation-delay: -8s; }

    .butterfly {
      position: absolute;
      opacity: 0.7;
      transform: translate3d(0, 0, 0);
      animation: butterflyDriftA 18s linear infinite;
      will-change: transform, opacity;
    }

    .butterfly svg {
      display: block;
      overflow: visible;
      filter: drop-shadow(0 0 4px rgba(120, 190, 240, 0.28));
    }

    .butterfly .wing-left,
    .butterfly .wing-right {
      transform-box: fill-box;
      transform-origin: left center;
      animation: wingBeat 1.9s ease-in-out infinite;
    }

    .butterfly-a {
      top: 34px;
      left: 24px;
      width: 104px;
      height: 84px;
    }

    .butterfly-b {
      right: 12px;
      bottom: 132px;
      width: 90px;
      height: 74px;
      opacity: 0.58;
      animation-name: butterflyDriftB;
      animation-duration: 21s;
      animation-delay: -9s;
    }

    .butterfly-b .wing-left,
    .butterfly-b .wing-right {
      animation-duration: 2.05s;
    }

    .butterfly-c {
      top: 196px;
      left: 188px;
      width: 82px;
      height: 66px;
      opacity: 0.5;
      animation-name: butterflyDriftC;
      animation-duration: 24s;
      animation-delay: -5s;
    }

    .butterfly-c .wing-left,
    .butterfly-c .wing-right {
      animation-duration: 2.3s;
    }

    .bf-num {
      position: absolute;
      left: -16px;
      bottom: -5px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: rgba(174, 212, 239, 0.78);
      letter-spacing: 0.04em;
      text-transform: none;
    }

    .bf-num::before {
      content: "FIG.";
      margin-right: 2px;
      opacity: 0.7;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(150, 201, 236, 0.22);
      pointer-events: none;
    }

    .wrap::after {
      content: "+";
      position: absolute;
      top: 0px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(168, 208, 238, 0.7);
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1;
      pointer-events: none;
    }

    .card,
    .footer {
      position: relative;
      flex: none;
      background:
        linear-gradient(180deg, rgba(20, 56, 88, 0.72), rgba(11, 38, 62, 0.78)),
        var(--paper);
      border: 1px solid var(--paper-edge);
      box-shadow:
        inset 0 0 0 1px rgba(150, 201, 236, 0.12),
        0 6px 16px rgba(4, 16, 28, 0.34);
      border-radius: 8px;
      overflow: hidden;
    }

    .card::before,
    .footer::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px dashed rgba(150, 201, 236, 0.26);
      border-radius: 5px;
      pointer-events: none;
    }

    .card::after,
    .footer::after {
      content: none;
    }

    .card {
      padding: 7px 13px 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-height: 32px;
      gap: 8px;
      margin: 0 0 7px;
      padding: 4px 0 6px;
      background: none;
      color: var(--text);
      font-weight: 700;
      border: 0;
      border-bottom: 1px solid var(--line);
      position: relative;
    }

    .brand::after {
      content: "+";
      position: absolute;
      right: 0;
      top: -2px;
      color: rgba(150, 201, 236, 0.5);
      font-family: var(--mono);
      font-size: 13px;
    }

    .brand img {
      width: 24px;
      height: 24px;
      object-fit: cover;
      flex: none;
      border-radius: 5px;
      filter: saturate(1.05) contrast(1.02);
      box-shadow:
        0 0 0 1px rgba(150, 201, 236, 0.55),
        0 0 7px rgba(120, 190, 240, 0.35);
      opacity: 1;
    }

    .brand-icon {
      width: 22px;
      height: 22px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
      color: var(--text);
      line-height: 1;
    }

    .brand-icon svg {
      width: 22px;
      height: 22px;
    }

    .brand h1 {
      margin: 0;
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-variant: small-caps;
    }

    .card[data-card="claude"] .brand h1 { color: #9fd2ff; }
    .card[data-card="codex"] .brand h1 { color: #84e0ea; }
    .card[data-card="projects"] .brand h1 { color: #c6e2f5; }

    .card[data-card="projects"] {
      flex: 1;
    }

    .card[data-card="projects"] .brand {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      align-items: center;
      height: auto;
      min-height: 0;
      column-gap: 8px;
      row-gap: 10px;
      margin-bottom: 10px;
    }

    .card[data-card="projects"] .brand-icon {
      grid-column: 1;
      grid-row: 1;
      justify-self: start;
    }

    .card[data-card="projects"] h1 {
      grid-column: 2;
      grid-row: 1;
      flex: none;
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
    }

    .card[data-card="projects"] .switch {
      grid-column: 1 / 3;
      grid-row: 2;
      width: calc((100% - 16px) / 3);
    }

    .card[data-card="projects"] .switch:nth-of-type(1) { justify-self: start; }
    .card[data-card="projects"] .switch:nth-of-type(2) { justify-self: center; }
    .card[data-card="projects"] .switch:nth-of-type(3) { justify-self: end; }

    .switch,
    .action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 3px 9px;
      background: rgba(10, 34, 56, 0.5);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      line-height: 1.1;
      font-weight: 700;
      border: 1px solid rgba(150, 201, 236, 0.5);
      box-shadow: inset 0 0 0 1px rgba(150, 201, 236, 0.08);
      border-radius: 5px;
      white-space: nowrap;
      transition: transform 120ms ease-out, background-color 120ms ease-out, border-color 120ms ease-out;
    }

    .switch:hover,
    .action:hover {
      background: rgba(22, 60, 92, 0.7);
      border-color: rgba(174, 212, 239, 0.78);
    }

    .action:active,
    .switch:active {
      transform: translateY(1px);
      background: rgba(8, 28, 46, 0.8);
    }

    .switch[data-active="true"] {
      background: linear-gradient(180deg, rgba(120, 190, 240, 0.95), var(--accent));
      color: #082033;
      border-color: rgba(174, 212, 239, 0.9);
      text-shadow: none;
    }

    .row,
    [data-project-list] {
      padding: 0 2px 4px;
      position: relative;
    }

    .row + .row {
      border-top: 1px dashed var(--line);
      margin-top: 8px;
      padding-top: 8px;
    }

    .card[data-card="claude"] .row:last-child,
    .card[data-card="codex"] .row:last-child {
      padding-bottom: 10px;
    }

    .row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .row-title {
      font-size: 15px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--text);
    }

    .percent {
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .track {
      position: relative;
      height: 12px;
      overflow: hidden;
      background: rgba(6, 22, 38, 0.66);
      border: 1px solid rgba(150, 201, 236, 0.4);
      box-shadow: inset 0 1px 3px rgba(3, 12, 22, 0.5);
      border-radius: 4px;
      padding: 2px;
    }

    .track::before {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(150, 201, 236, 0.12) 0 1px,
          transparent 1px 10px
        );
      opacity: 0.6;
      pointer-events: none;
      z-index: 2;
    }

    .fill {
      width: 0%;
      height: 100%;
      min-width: 0;
      position: relative;
      z-index: 1;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(150, 201, 236, 0.5), var(--accent) 34%, var(--accent) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(190, 224, 248, 0.22),
        0 0 8px rgba(120, 190, 240, 0.34);
      transition: width 140ms ease-out, background-color 140ms ease-out;
    }

    .fill::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.26), transparent 70%);
      opacity: 0.7;
    }

    .reset {
      margin-top: 4px;
      padding-right: 2px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.3;
      font-weight: 400;
      text-align: right;
      white-space: nowrap;
    }

    .reset[data-warning="true"] {
      color: var(--danger);
      font-weight: 700;
    }

    .row[data-available="false"] .percent,
    .row[data-available="false"] .reset {
      color: var(--muted);
    }

    .row[data-available="false"] .fill {
      width: 0%;
    }

    .proj-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px;
      padding: 6px 2px;
      font-size: 14px;
      line-height: 1.3;
    }

    .proj-rank {
      width: 18px;
      color: var(--muted);
      font-family: var(--mono);
      font-weight: 700;
      flex: none;
    }

    .proj-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .proj-tokens {
      color: var(--accent);
      font-family: var(--mono);
      font-weight: 700;
      white-space: nowrap;
    }

    .proj-cost {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      white-space: nowrap;
    }

    .proj-bar {
      flex: 0 0 100%;
      width: 100%;
      height: 4px;
      margin-top: 6px;
      align-self: end;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(6, 22, 38, 0.6);
      box-shadow: inset 0 0 0 1px rgba(150, 201, 236, 0.16);
    }

    .proj-bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(150, 201, 236, 0.5), var(--projects));
      opacity: 0.92;
    }

    .proj-row:first-child .proj-bar {
      height: 4.5px;
    }

    .proj-row:first-child .proj-bar-fill {
      opacity: 1;
    }

    .proj-row:last-child .proj-bar {
      margin-bottom: 2px;
    }

    .footer {
      min-height: 128px;
      padding: 11px 12px;
    }

    .meta {
      display: grid;
      gap: 6px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.3;
      font-weight: 400;
    }

    .today {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--line);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.3;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .action {
      min-height: 32px;
      font-size: 13px;
      line-height: 1;
      padding: 4px 10px;
      flex: 1;
    }

    .action.primary {
      color: #082033;
      background: linear-gradient(180deg, #8fc8ff, #5aa9ee);
      border-color: rgba(174, 212, 239, 0.9);
      text-shadow: none;
    }

    .action.primary:hover {
      background: linear-gradient(180deg, #a3d3ff, #6fb5f2);
      color: #061a2b;
    }

    .attribution {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }

    .attribution a {
      color: inherit;
      text-decoration: none;
    }

    @keyframes wingBeat {
      0%, 100% { transform: rotateY(8deg); }
      50% { transform: rotateY(52deg); }
    }

    @keyframes butterflyDriftA {
      0% { transform: translate3d(-6px, 0, 0) rotate(-5deg); opacity: 0.18; }
      12% { opacity: 0.85; }
      24% { transform: translate3d(58px, 20px, 0) rotate(3deg); }
      48% { transform: translate3d(166px, -10px, 0) rotate(-6deg); }
      72% { transform: translate3d(228px, 38px, 0) rotate(4deg); }
      88% { opacity: 0.85; }
      100% { transform: translate3d(302px, 14px, 0) rotate(-4deg); opacity: 0.12; }
    }

    @keyframes butterflyDriftB {
      0% { transform: translate3d(0, 0, 0) rotate(7deg); opacity: 0.1; }
      16% { opacity: 0.74; }
      38% { transform: translate3d(-72px, -18px, 0) rotate(-2deg); }
      64% { transform: translate3d(-154px, 22px, 0) rotate(6deg); }
      84% { opacity: 0.74; }
      100% { transform: translate3d(-224px, -8px, 0) rotate(-5deg); opacity: 0.05; }
    }

    @keyframes butterflyDriftC {
      0% { transform: translate3d(0, 0, 0) rotate(4deg); opacity: 0.06; }
      14% { opacity: 0.72; }
      36% { transform: translate3d(-44px, 54px, 0) rotate(-6deg); }
      60% { transform: translate3d(30px, 122px, 0) rotate(5deg); }
      84% { opacity: 0.68; }
      100% { transform: translate3d(-18px, 208px, 0) rotate(-3deg); opacity: 0.04; }
    }

    @keyframes dustFloat {
      0%, 100% { transform: translate3d(0, 0, 0); opacity: 0.2; }
      50% { transform: translate3d(12px, -8px, 0); opacity: 0.38; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    .blueprint-frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .bp-corner {
      position: absolute;
      width: 13px;
      height: 13px;
    }

    .bp-corner.tl { top: 5px; left: 5px; border-top: 1.5px solid rgba(168, 208, 238, 0.62); border-left: 1.5px solid rgba(168, 208, 238, 0.62); }
    .bp-corner.tr { top: 5px; right: 5px; border-top: 1.5px solid rgba(168, 208, 238, 0.62); border-right: 1.5px solid rgba(168, 208, 238, 0.62); }
    .bp-corner.bl { bottom: 5px; left: 5px; border-bottom: 1.5px solid rgba(168, 208, 238, 0.62); border-left: 1.5px solid rgba(168, 208, 238, 0.62); }
    .bp-corner.br { bottom: 5px; right: 5px; border-bottom: 1.5px solid rgba(168, 208, 238, 0.62); border-right: 1.5px solid rgba(168, 208, 238, 0.62); }

    .bp-title {
      position: absolute;
      left: 1px;
      top: 50%;
      transform-origin: left center;
      transform: rotate(-90deg) translate(-50%, 0);
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.32em;
      color: rgba(160, 202, 234, 0.5);
      white-space: nowrap;
    }

    .hide-codex [data-card="codex"] { display: none; }
    .hide-claude [data-card="claude"] { display: none; }
  </style>
</head>

  <div class="blueprint-frame" aria-hidden="true">
    <span class="bp-corner tl"></span><span class="bp-corner tr"></span>
    <span class="bp-corner bl"></span><span class="bp-corner br"></span>
    <span class="bp-title">CYANOTYPE · PLATE No.5 · SCALE 1:1</span>
  </div>

  <div class="specimen-drift" aria-hidden="true">
    <span class="dust dust-a"></span>
    <span class="dust dust-b"></span>
    <span class="dust dust-c"></span>
    <div class="butterfly butterfly-a">
      <svg viewBox="-46 -50 92 92" xmlns="http://www.w3.org/2000/svg">
        <use href="#engWing" class="wing-right"/>
        <g transform="scale(-1,1)"><use href="#engWing" class="wing-left"/></g>
        <use href="#engBody"/>
      </svg>
      <span class="bf-num">9</span>
    </div>
    <div class="butterfly butterfly-b">
      <svg viewBox="-46 -50 92 92" xmlns="http://www.w3.org/2000/svg">
        <use href="#engWing" class="wing-right"/>
        <g transform="scale(-1,1)"><use href="#engWing" class="wing-left"/></g>
        <use href="#engBody"/>
      </svg>
      <span class="bf-num">3</span>
    </div>
    <div class="butterfly butterfly-c">
      <svg viewBox="-46 -50 92 92" xmlns="http://www.w3.org/2000/svg">
        <use href="#engWing" class="wing-right"/>
        <g transform="scale(-1,1)"><use href="#engWing" class="wing-left"/></g>
        <use href="#engBody"/>
      </svg>
      <span class="bf-num">7</span>
    </div>
  </div>

  <main class="wrap">
    <section class="card" data-card="claude" style="--accent: var(--claude)">
      <header class="brand">
        <img src="{{CLAUDE_ICON}}" alt="">
        <h1 data-i18n="claude_name">Claude Code</h1>
        <button class="switch" data-action="switch" data-i18n="switch_panel">⇄ Switch Panel</button>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="codex" style="--accent: var(--codex)">
      <header class="brand">
        <img src="{{CODEX_ICON}}" alt="">
        <h1 data-i18n="codex_name">Codex</h1>
      </header>
      <div class="row" data-row="session"></div>
      <div class="row" data-row="weekly"></div>
    </section>

    <section class="card" data-card="projects" style="--accent: var(--projects)">
      <header class="brand">
        <div class="brand-icon"><svg width="30" height="30" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M5.25 18.6C7.2 16.6 9.25 15.2 11.2 14.6C12.55 14.2 13.5 13.2 13.95 11.9C14.7 9.85 16.45 8.1 19.15 6.7" stroke="var(--projects)" stroke-width="1.55" stroke-linecap="round"/><path d="M8.1 18.9C8.4 16.45 9.55 14.3 11.45 12.95C13.1 11.8 14.15 10.1 14.35 8.15" stroke="var(--projects)" stroke-width="1.35" stroke-linecap="round" opacity="0.75"/><path d="M5.55 18.95C6.95 20.55 8.95 21.25 11.1 21.25C14.95 21.25 18.1 18.2 18.1 14.45C18.1 12.95 17.7 11.55 16.95 10.35" stroke="var(--projects)" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round"/><path d="M16.3 6.2C17.55 5.1 19.15 4.75 20.95 4.75" stroke="var(--projects)" stroke-width="1.35" stroke-linecap="round"/><circle cx="18.85" cy="14.15" r="1.85" fill="var(--projects)" opacity="0.2" stroke="var(--projects)" stroke-width="1.25"/><path d="M17.3 14.15H20.4" stroke="var(--projects)" stroke-width="1.2" stroke-linecap="round"/></svg></div>
        <h1 data-i18n="projects_title">Project Usage</h1>
        <button class="switch" data-action="toggle-project-range">Today</button>
        <button class="switch" data-action="analyze" data-i18n="analyze_usage">Analyze</button>
        <button class="switch" data-action="toggle-statusline" data-i18n="cli">CLI</button>
      </header>
      <div data-project-list></div>
    </section>

    <section class="footer">
      <div class="meta">
        <div data-footer="rate">Rate: --</div>
        <div data-footer="status">Status: Loading</div>
      </div>
      <div class="today" data-footer="today">Today: $0.00 (0 tokens)</div>

      <div class="actions">
        <button class="action primary" data-action="refresh" data-i18n="refresh_now">↻ Refresh Now</button>
        <button class="action" data-action="quit" data-i18n="quit">⏻ Quit</button>
      </div>
      <p class="attribution">based on usage by lollapalooza</p>
    </section>
  </main>

  <script>
    const I18N = {{I18N_BUNDLE}};
    const FALLBACK_LANGUAGE = "en";
    const root = document.documentElement;
    let currentLanguage = "en";
    let projectRange = "1d";
    let latestState = null;

    function languageTable(language) {
      return I18N[language] || I18N[FALLBACK_LANGUAGE] || {};
    }

    function t(key, params = {}) {
      const template = languageTable(currentLanguage)[key] || languageTable(FALLBACK_LANGUAGE)[key] || key;
      return template.replace(/\{(\w+)\}/g, (_, name) => `${params[name] ?? ""}`);
    }

    function labels() {
      return {
        session: t("session_label"),
        weekly: t("weekly_label"),
      };
    }

    function projectRangeLabel(range) {
      if (range === "7d") return t("project_range_7d");
      if (range === "30d") return t("project_range_30d");
      if (range === "all") return t("project_range_all");
      return t("project_range_1d");
    }

    function applyStaticText() {
      document.documentElement.lang = currentLanguage === "zh-TW" ? "zh-Hant" : currentLanguage;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.dataset.i18n;
        if (key) node.textContent = t(key);
      });
      const rangeButton = document.querySelector('[data-action="toggle-project-range"]');
      if (rangeButton) rangeButton.textContent = projectRangeLabel(projectRange);
    }

    window.usageSetLanguage = function usageSetLanguage(language) {
      currentLanguage = I18N[language] ? language : FALLBACK_LANGUAGE;
      applyStaticText();
      if (latestState) {
        window.usageApplyState({ ...latestState, language: currentLanguage });
      }
    };

    function cssVar(name) {
      return getComputedStyle(root).getPropertyValue(name).trim();
    }

    function colorFor(percent, fallback) {
      if (typeof percent !== "number") return fallback;
      if (percent >= 80) return cssVar("--danger");
      if (percent >= 50) return cssVar("--warn");
      return fallback;
    }

    function renderRow(card, key, row) {
      const el = document.querySelector(`[data-card="${card}"] [data-row="${key}"]`);
      if (!el) return;
      const cardEl = el.closest(".card");
      if (!cardEl) return;
      const data = row || {
        percent: null,
        percentText: "--",
        resetText: t("reset_placeholder"),
        warning: false,
        available: false,
      };
      const available = data.available === true && typeof data.percent === "number";
      const accent = getComputedStyle(cardEl).getPropertyValue("--accent").trim();
      const color = colorFor(data.percent, accent);
      el.dataset.available = available ? "true" : "false";
      if (el.dataset.rowReady !== "true") {
        el.innerHTML = `
          <div class="row-head">
            <div class="row-title"></div>
            <div class="percent"></div>
          </div>
          <div class="track"><div class="fill"></div></div>
          <div class="reset"></div>
        `;
        el.dataset.rowReady = "true";
      }
      const title = el.querySelector(".row-title");
      const percent = el.querySelector(".percent");
      const reset = el.querySelector(".reset");
      const fill = el.querySelector(".fill");
      if (!title || !percent || !reset || !fill) return;
      title.textContent = data.title != null ? data.title : labels()[key];
      percent.textContent = data.percentText || "--";
      reset.textContent = data.resetText || t("reset_placeholder");
      reset.dataset.warning = data.warning === true ? "true" : "false";
      percent.style.color = available ? color : "";
      fill.style.width = available ? `${Math.max(0, Math.min(100, data.percent))}%` : "0%";
      fill.style.background = color;
    }

    function applyCard(name, rows) {
      renderRow(name, "session", rows && rows.session);
      renderRow(name, "weekly", rows && rows.weekly);
    }

    function renderProjects(projects) {
      const list = document.querySelector('[data-project-list]');
      if (!list) return;
      const ranks = ["①", "②", "③"];
      const rows = (projects || []).slice(0, 3);
      const totalTokens = rows.reduce((s, p) => s + Math.max(0, Number(p.tokens) || 0), 0);
      list.replaceChildren();
      if (rows.length === 0) {
        const empty = document.createElement("div");
        empty.style.cssText = "color:var(--muted);font-size:13px;padding:8px 0";
        empty.textContent = t("projects_empty");
        list.append(empty);
        return;
      }
      rows.forEach((p, i) => {
        const tokens = Math.max(0, Number(p.tokens) || 0);
        const width = totalTokens > 0 ? Math.max(0, Math.min(100, (tokens / totalTokens) * 100)) : 0;
        const row = document.createElement("div");
        row.className = "proj-row";
        const rank = document.createElement("span");
        rank.className = "proj-rank";
        rank.textContent = ranks[i];
        const name = document.createElement("span");
        name.className = "proj-name";
        name.textContent = p.name || "";
        const tok = document.createElement("span");
        tok.className = "proj-tokens";
        tok.textContent = p.tokensText || "";
        const cost = document.createElement("span");
        cost.className = "proj-cost";
        cost.textContent = p.costText || "";
        const bar = document.createElement("div");
        bar.className = "proj-bar";
        const fill = document.createElement("div");
        fill.className = "proj-bar-fill";
        fill.style.width = `${width}%`;
        bar.append(fill);
        row.append(rank, name, tok, cost, bar);
        list.append(row);
      });
    }





    function renderStatusline(statusline) {
      const data = statusline || {};
      const button = document.querySelector('[data-action="toggle-statusline"]');
      if (button) {
        const enabled = data.enabled === true;
        button.dataset.active = enabled ? "true" : "false";
        button.textContent = enabled ? t("cli_enabled") : t("cli_disabled");
      }
    }

    function relocateSwitchButton(state) {
      // The switch button lives in the Claude card header; when that card is
      // hidden, move it to the next visible home so the menu stays reachable.
      const button = document.querySelector('[data-action="switch"]');
      if (!button) return;
      let host = document.querySelector('[data-card="claude"] .brand');
      let className = "switch";
      if (state.hideClaude && !state.hideCodex) {
        host = document.querySelector('[data-card="codex"] .brand');
      } else if (state.hideClaude && state.hideCodex) {
        host = document.querySelector(".footer .actions");
        className = "action";
      }
      if (!host) return;
      button.className = className;
      if (button.parentElement !== host) host.appendChild(button);
    }

    window.usageApplyState = function usageApplyState(state) {
      document.documentElement.classList.toggle('hide-codex', !!state.hideCodex);
      document.documentElement.classList.toggle('hide-claude', !!state.hideClaude);
      relocateSwitchButton(state);
      currentLanguage = I18N[state.language] ? state.language : currentLanguage;
      applyStaticText();
      applyCard("claude", state.claude);
      applyCard("codex", state.codex);
      latestState = state;
      renderProjects(
        projectRange === "1d" ? state.projects
        : projectRange === "7d" ? state.projects7d
        : projectRange === "30d" ? state.projects30d
        : projectRange === "all" ? state.projectsAll
        : state.projects
      );
      renderStatusline(state.statusline || {});
      const rate = document.querySelector('[data-footer="rate"]');
      const status = document.querySelector('[data-footer="status"]');
      const today = document.querySelector('[data-footer="today"]');
      if (rate) rate.textContent = state.footer.rate || t("rate_text", { value: "--" });
      if (status) status.textContent = state.footer.status || t("status_text", { value: "--" });
      if (today) today.textContent = state.footer.today || t("today_text", { cost: "0.00", tokens: "0" });
    };

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      if (button.dataset.action === "toggle-project-range") {
        projectRange = projectRange === "1d" ? "7d" : projectRange === "7d" ? "30d" : projectRange === "30d" ? "all" : "1d";
        button.textContent = projectRangeLabel(projectRange);
        if (latestState) {
          renderProjects(
            projectRange === "1d" ? latestState.projects
            : projectRange === "7d" ? latestState.projects7d
            : projectRange === "30d" ? latestState.projects30d
            : projectRange === "all" ? latestState.projectsAll
            : latestState.projects
          );
        }
        return;
      }
      const bridge = window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.usage;
      if (bridge && typeof bridge.postMessage === "function") {
        bridge.postMessage(button.dataset.action);
      }
    });

    window.usageApplyState({
      language: "en",
      claude: { session: {}, weekly: {} },
      codex: { session: {}, weekly: {} },
      projects: [],
      projects7d: [],
      projects30d: [],
      projectsAll: [],
      statusline: {},
      footer: { rate: "Rate: --", status: "Status: Loading", today: "Today: $0.00 (0 tokens)", showInstall: false }
    });
  </script>
</body>
</html>
